<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO'S FAMILY | Official</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #00e5ff; --bg: #020b10; --surface: #03161d; }
        *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden; }

        #bg-canvas { position: fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; }

        nav, .hero, .ps5-section, .discord-section, #audioContainer { position: relative; z-index: 2; }

        nav {
            position: fixed; top:0; width:100%; z-index:40;
            background: rgba(2,11,16,0.88);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,229,255,0.1);
            padding: 14px 20px;
        }
        .nav-inner { max-width:1000px; margin:0 auto; display:flex; justify-content:space-between; align-items:center; }
        .nav-logo { font-weight:900; font-style:italic; text-transform:uppercase; letter-spacing:-0.04em; font-size:16px; color:#fff; text-decoration:none; }
        .nav-logo span { color: var(--cyan); }
        .nav-links { display:flex; gap:16px; align-items:center; }
        .nav-rules { color:var(--cyan); font-weight:700; text-transform:uppercase; font-size:11px; letter-spacing:0.15em; text-decoration:none; transition:color 0.2s; cursor:pointer; background:none; border:none; font-family:inherit; }
        .btn-join { background:var(--cyan); color:#000; padding:8px 18px; border-radius:999px; font-weight:900; font-size:10px; text-transform:uppercase; letter-spacing:0.08em; text-decoration:none; transition:opacity 0.2s; display:inline-block; }

        /* ===== HERO ===== */
        .hero { display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:150px 20px 90px; min-height:100vh; }
        .logo-card { width:190px; height:190px; transform-style:preserve-3d; transition:transform 0.08s ease-out; position:relative; }
        .logo-img { width:190px; height:190px; object-fit:cover; border-radius:50%; border:2px solid rgba(0,229,255,0.6); }
        h1 { font-size:clamp(40px,10vw,88px); font-weight:900; font-style:italic; text-transform:uppercase; letter-spacing:-0.04em; text-shadow:0 0 40px rgba(0,229,255,0.3); line-height:1; margin-bottom:14px; }
        
        /* ===== PS5 SECTION (AKFA EFFECT) ===== */
        .ps5-section { width: 100%; min-height: 500vh; position: relative; background: transparent; }
        .ps5-sticky { position: sticky; top: 0; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; perspective: 1200px; }
        
        .ps5-wrapper { position: relative; z-index: 5; transition: transform 0.1s ease-out, opacity 0.1s ease-out; will-change: transform, opacity; }
        .ps5-img { 
            width: min(600px, 80vw); 
            mix-blend-mode: lighten; 
            filter: drop-shadow(0 0 50px rgba(0,229,255,0.3));
        }

        .game-info-panel {
            position: absolute; right: 10%; top: 50%; transform: translateY(-50%);
            text-align: right; opacity: 0; transition: all 0.5s ease; z-index: 10; pointer-events: none;
        }
        .game-info-panel.visible { opacity: 1; transform: translateY(-50%) translateX(0); }
        .game-info-name { font-size: clamp(30px, 6vw, 60px); font-weight: 900; font-style: italic; text-transform: uppercase; color: #fff; text-shadow: 0 0 30px var(--cyan); }
        .game-info-number { font-family: 'JetBrains Mono'; font-size: 100px; color: rgba(0,229,255,0.1); margin-bottom: -30px; }

        /* ===== DISCORD ===== */
        .discord-section { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .btn-discord { background: var(--cyan); color: #000; padding: 20px 50px; border-radius: 999px; font-weight: 900; text-decoration: none; text-transform: uppercase; }

        #audioContainer { position: fixed; bottom: 20px; right: 20px; z-index: 100; display: flex; gap: 10px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 50px; }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<nav>
    <div class="nav-inner">
        <a href="#" class="nav-logo">ECHO'S <span>FAMILY</span></a>
        <div class="nav-links">
            <button class="nav-rules" onclick="openModal()">Rules</button>
            <a href="https://discord.gg/328cwmvw7V" class="btn-join">Join Now</a>
        </div>
    </div>
</nav>

<section class="hero">
    <div class="logo-card" id="logoCard">
        <img src="echo logo.png" alt="Echo Logo" class="logo-img">
    </div>
    <h1>ECHO'S FAMILY</h1>
    <p style="color:var(--cyan); letter-spacing: 0.5em; font-size: 10px; text-transform: uppercase;">Safety • Friendship • Fun</p>
</section>

<section class="ps5-section" id="ps5Section">
    <div class="ps5-sticky">
        <div class="game-info-panel" id="gameInfoPanel">
            <div class="game-info-number" id="gameNumber">01</div>
            <div class="game-info-name" id="gameName">FORTNITE</div>
            <div style="display:flex; gap:10px; justify-content: flex-end;" id="gameTags">
                <span style="border:1px solid var(--cyan); padding:2px 8px; font-size:10px;">BATTLE ROYALE</span>
            </div>
        </div>

        <div class="ps5-wrapper" id="ps5Wrapper">
            <img src="ps5.png" alt="PS5" class="ps5-img" id="ps5Img">
        </div>
    </div>
</section>

<section class="discord-section">
    <h2 style="font-size: 50px; margin-bottom: 30px;">PRÊT À REJOINDRE ?</h2>
    <a href="https://discord.gg/328cwmvw7V" class="btn-discord">REJOINDRE LE DISCORD</a>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    // --- STAR BACKGROUND ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({canvas: document.getElementById('bg-canvas'), alpha: true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    const starsGeometry = new THREE.BufferGeometry();
    const starsCount = 1500;
    const posArray = new Float32Array(starsCount * 3);
    for(let i=0; i < starsCount * 3; i++) posArray[i] = (Math.random() - 0.5) * 100;
    starsGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
    const starsMaterial = new THREE.PointsMaterial({size: 0.05, color: 0x00e5ff});
    const starsMesh = new THREE.Points(starsGeometry, starsMaterial);
    scene.add(starsMesh);
    camera.position.z = 30;
    function animateStars() { requestAnimationFrame(animateStars); starsMesh.rotation.y += 0.001; renderer.render(scene, camera); }
    animateStars();

    // --- GAMES DATA ---
    const GAMES = [
        { name: 'FORTNITE', num: '01', tags: ['Battle Royale', 'Pro'] },
        { name: 'MINECRAFT', num: '02', tags: ['Survival', 'Build'] },
        { name: 'VALORANT', num: '03', tags: ['Tactical', 'FPS'] },
        { name: 'GTA RP', num: '04', tags: ['Roleplay', 'RedSide'] }
    ];

    // --- AKFA ZOOM EFFECT & GAME SWITCH ---
    window.addEventListener('scroll', () => {
        const section = document.getElementById('ps5Section');
        const ps5 = document.getElementById('ps5Wrapper');
        const info = document.getElementById('gameInfoPanel');
        
        const rect = section.getBoundingClientRect();
        const scrollPercent = Math.max(0, Math.min(1, -rect.top / (rect.height - window.innerHeight)));

        // 1. Zoom de la PS5 (Scale de 1 à 8)
        let scale = 1 + (scrollPercent * 7);
        // 2. Disparition (Opacité de 1 à 0)
        let opacity = 1 - (scrollPercent * 1.2);
        // 3. Rotation légère pour l'angle
        let rotation = scrollPercent * 15;

        ps5.style.transform = `scale(${scale}) rotateY(${rotation}deg)`;
        ps5.style.opacity = opacity;

        // Affichage des titres de jeux selon le scroll
        const gameIndex = Math.floor(scrollPercent * GAMES.length);
        if (GAMES[gameIndex]) {
            document.getElementById('gameName').innerText = GAMES[gameIndex].name;
            document.getElementById('gameNumber').innerText = GAMES[gameIndex].num;
            info.classList.add('visible');
        }

        if (scrollPercent > 0.8 || scrollPercent < 0.05) {
            info.classList.remove('visible');
        }
    });

    // --- LOGO TILT ---
    const card = document.getElementById('logoCard');
    document.addEventListener('mousemove', (e) => {
        let x = (window.innerWidth / 2 - e.pageX) / 20;
        let y = (window.innerHeight / 2 - e.pageY) / 20;
        card.style.transform = `rotateX(${y}deg) rotateY(${-x}deg)`;
    });
</script>
</body>
</html>
