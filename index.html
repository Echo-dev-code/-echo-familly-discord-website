<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO'S FAMILY | Official</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #00e5ff; --bg: #020b10; --surface: #03161d; }
        *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden; }

        #bg-canvas { position: fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; }

        nav, .hero, .ps5-section, .discord-section, #audioContainer { position: relative; z-index: 2; }

        nav {
            position: fixed; top:0; width:100%; z-index:40;
            background: rgba(2,11,16,0.88);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,229,255,0.1);
            padding: 14px 20px;
        }
        .nav-inner { max-width:1000px; margin:0 auto; display:flex; justify-content:space-between; align-items:center; }
        .nav-logo { font-weight:900; font-style:italic; text-transform:uppercase; letter-spacing:-0.04em; font-size:16px; color:#fff; text-decoration:none; }
        .nav-logo span { color: var(--cyan); }
        .nav-links { display:flex; gap:16px; align-items:center; }
        .nav-rules { color:var(--cyan); font-weight:700; text-transform:uppercase; font-size:11px; letter-spacing:0.15em; text-decoration:none; transition:color 0.2s; cursor:pointer; background:none; border:none; font-family:inherit; }
        .btn-join { background:var(--cyan); color:#000; padding:8px 18px; border-radius:999px; font-weight:900; font-size:10px; text-transform:uppercase; letter-spacing:0.08em; text-decoration:none; transition:opacity 0.2s; display:inline-block; }

        /* ===== HERO ===== */
        .hero { display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:150px 20px 90px; min-height:100vh; }
        .logo-card { width:190px; height:190px; transform-style:preserve-3d; transition:transform 0.08s ease-out; position:relative; }
        .logo-img { width:190px; height:190px; object-fit:cover; border-radius:50%; border:2px solid rgba(0,229,255,0.6); }
        h1 { font-size:clamp(40px,10vw,88px); font-weight:900; font-style:italic; text-transform:uppercase; letter-spacing:-0.04em; text-shadow:0 0 40px rgba(0,229,255,0.3); line-height:1; margin-bottom:14px; }
        #clock { font-family:'JetBrains Mono',monospace; letter-spacing:0.2em; background:rgba(0,229,255,0.05); border:1px solid rgba(0,229,255,0.14); padding:4px 14px; border-radius:8px; color:var(--cyan); font-size:13px; font-weight:700; display:inline-block; margin-bottom:22px; }

        /* ===== PS5 SECTION (EFFET AKFA) ===== */
        .ps5-section { width: 100%; min-height: 600vh; position: relative; }
        .ps5-sticky { position: sticky; top: 0; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; perspective: 1500px; }
        
        .ps5-wrapper { 
            position: relative; 
            z-index: 5; 
            transition: transform 0.1s ease-out, opacity 0.1s ease-out; 
            will-change: transform, opacity;
        }

        .ps5-img { 
            width: min(500px, 75vw); 
            mix-blend-mode: lighten; 
            filter: drop-shadow(0 0 40px rgba(0,229,255,0.25));
        }

        .game-info-panel {
            position: absolute; right: 40px; top: 50%; transform: translateY(-50%);
            text-align: right; opacity: 0; transition: opacity 0.4s ease; z-index: 10; pointer-events: none;
        }
        .game-info-panel.visible { opacity: 1; }
        .game-info-name { font-size: clamp(28px, 5vw, 52px); font-weight: 900; font-style: italic; text-transform: uppercase; color: #fff; text-shadow: 0 0 30px rgba(0,229,255,0.4); }
        .game-info-number { font-family: 'JetBrains Mono'; font-size: 80px; color: rgba(0,229,255,0.08); margin-bottom: -20px; }

        /* ===== DISCORD ===== */
        .discord-section { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 80px 20px; }
        .btn-discord { display: inline-flex; align-items: center; gap: 12px; background: var(--cyan); color: #000; padding: 20px 52px; border-radius: 999px; font-weight: 900; text-decoration: none; text-transform: uppercase; }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<nav>
    <div class="nav-inner">
        <a href="#" class="nav-logo">ECHO'S <span>FAMILY</span></a>
        <div class="nav-links">
            <button class="nav-rules">Rules</button>
            <a href="https://discord.gg/328cwmvw7V" target="_blank" class="btn-join">Join Now</a>
        </div>
    </div>
</nav>

<section class="hero">
    <div class="logo-card" id="logoCard">
        <img src="echo logo.png" alt="Echo Logo" class="logo-img">
    </div>
    <h1>ECHO'S FAMILY</h1>
    <div id="clock">00:00:00</div>
    <p style="color:#444; letter-spacing:0.5em; font-size:10px; text-transform:uppercase;">Safety &bull; Friendship &bull; Fun</p>
</section>

<section class="ps5-section" id="ps5Section">
    <div class="ps5-sticky">
        <div class="game-info-panel" id="gameInfoPanel">
            <div class="game-info-number" id="gameNumber">01</div>
            <div class="game-info-name" id="gameName">FORTNITE</div>
            <div style="display:flex; gap:8px; justify-content: flex-end;">
                <span style="font-size:9px; color:var(--cyan); border:1px solid var(--cyan); padding:4px 10px; border-radius:999px;">BATTLE ROYALE</span>
            </div>
        </div>

        <div class="ps5-wrapper" id="ps5Wrapper">
            <img src="ps5.png" alt="PS5" class="ps5-img" id="ps5Img">
        </div>
    </div>
</section>

<section class="discord-section">
    <h2 style="font-size: clamp(36px, 8vw, 88px); font-weight: 900; text-transform: uppercase; font-style: italic;">JOIN THE FAMILY</h2>
    <a href="https://discord.gg/328cwmvw7V" target="_blank" class="btn-discord">Join Now</a>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    // --- CLOCK ---
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0') + ":" + now.getSeconds().toString().padStart(2, '0');
    }
    setInterval(updateClock, 1000);

    // --- GAMES DATA ---
    const GAMES = [
        { name: 'FORTNITE', num: '01' },
        { name: 'MINECRAFT', num: '02' },
        { name: 'VALORANT', num: '03' },
        { name: 'GTA RP', num: '04' }
    ];

    // --- EFFET ZOOM AKFA HOLDING ---
    window.addEventListener('scroll', () => {
        const section = document.getElementById('ps5Section');
        const wrapper = document.getElementById('ps5Wrapper');
        const info = document.getElementById('gameInfoPanel');
        
        const rect = section.getBoundingClientRect();
        // Calcule le % de défilement dans la section PS5 (0 à 1)
        const scrollPercent = Math.max(0, Math.min(1, -rect.top / (rect.height - window.innerHeight)));

        // ZOOM : De 1 à 10 (la PS5 s'approche et nous dépasse)
        let scale = 1 + (scrollPercent * 9);
        // OPACITÉ : Disparaît progressivement (comme le bâtiment d'Akfa)
        let opacity = 1 - (scrollPercent * 1.5);
        
        wrapper.style.transform = `scale(${scale})`;
        wrapper.style.opacity = opacity > 0 ? opacity : 0;

        // CHANGEMENT DE TITRES : On change le texte selon la position
        const gameIndex = Math.floor(scrollPercent * GAMES.length);
        if (GAMES[gameIndex] && scrollPercent > 0.05) {
            document.getElementById('gameName').innerText = GAMES[gameIndex].name;
            document.getElementById('gameNumber').innerText = GAMES[gameIndex].num;
            info.classList.add('visible');
        } else {
            info.classList.remove('visible');
        }
    });

    // --- STARFIELD BACKGROUND ---
    const canvas = document.getElementById('bg-canvas');
    const renderer = new THREE.WebGLRenderer({canvas, alpha: true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.z = 30;
    const geo = new THREE.BufferGeometry();
    const positions = new Float32Array(1000 * 3);
    for(let i=0; i<3000; i++) positions[i] = (Math.random()-0.5)*100;
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const mat = new THREE.PointsMaterial({size: 0.1, color: 0x00e5ff});
    const stars = new THREE.Points(geo, mat);
    scene.add(stars);
    function animate() { requestAnimationFrame(animate); stars.rotation.y += 0.001; renderer.render(scene, camera); }
    animate();
</script>
</body>
</html>
